%YAML 1.1
---
$schema: "http://stsci.edu/schemas/yaml-schema/draft-01"
id: "http://emprogen.com/schemas/java/maven/service/jaxrs/quarkus/p2/v25/schema"
tag: "tag:emprogen.com:java/maven/service/jaxrs/quarkus/p2/v25/schema"
title: |
  Schema for yaml defining jaxrs quarkus service.
description: |
  This schema defines the rules for authoring a yaml defining a quarkus service generated from a jaxrs API definition.
examples:
  - |
    id: com.emprogen.java.maven.service.jaxrs.quarkus.p2.v25
    generatedGav: com.github.mshin:example-service-impl
    author: MunChul Shin
    serviceInterfaceGav: com.github.mshin:jaxrms-crud-rs-api:1.0.3
    dependencyGav:
        - com.github.mshin:example-domain-model:0.0.1
    license:
        - licenseFile: licenses/LICENSE.txt
          fileTypes:
              - .java
type: object
properties:
  id:
    type: string
    pattern: "^[\\w\\.\\-]+$"
    description: |
      The unique path to the generate script. '.' delimited.
  generatedGav:
    type: string
    pattern: "^[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+(:.+|)$"
    description: |
      The maven GAV (groupId:artifactId:version) for the generated code.
  author:
    type: string
    description: |
      The person who authored the code.
  dependencyGav:
    type: array
    description: |
      A list of dependency GAVs to add to the generated projects' pom.
    items:
      type: string
      pattern: "^[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+$"
  serviceInterfaceGav:
    type: string
    pattern: "^[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+$"
    description: |
      The GAV for the module containing the jaxrs interface used to generate the service.
  license:
    type: array
    description: |
      A list of license files and the file types they should be applied to.
      Licenses will be prepended to files of the corresponding type.
      Licenses will be prepended in the order they are listed, so if multiple licenses apply to a file type, the first license in the list will be the bottom-most license in the file.
    items:
      type: object
      properties:
        licenseFile:
          type: string
          description: |
            The path to where the license file is located.
        fileTypes:
          type: array
          description: |
            The file extension types corresponding to the license.
            All files of these extensions will have the license prepended.
          items:
            type: string
            pattern: "^\\.([\\w~]+|\\*)$"
            description: |
              A specific file extension starting with '.' ex: '.java' or '.xml'.
              '.*' can be used to specify all file types.
required: [id, generatedGav, serviceInterfaceGav]
additionalProperties: false