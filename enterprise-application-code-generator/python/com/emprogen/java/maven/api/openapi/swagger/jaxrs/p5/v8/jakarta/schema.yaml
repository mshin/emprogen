%YAML 1.1
---
$schema: "http://stsci.edu/schemas/yaml-schema/draft-01"
id: "http://emprogen.com/schemas/java/maven/api/openapi/swagger/jaxrs/p5/v8/jakarta/schema"
tag: "tag:emprogen.com:java/maven/api/openapi/swagger/jaxrs/p5/v8/jakarta/schema"
title: |
  Schema for yaml defining openapi jaxrs generation.
description: |
  This schema is for yaml descriptors defining generation of jaxrs interfaces from openapi.
examples:
  - |
    id: com.emprogen.java.maven.api.openapi.swagger.jaxrs.p5.v8.jakarta
    generatedGav: com.github.mshin:example-api:1.0.0
    openapiFile: openapi.yml
  - |
    id: com.emprogen.java.maven.api.openapi.swagger.jaxrs.p5.v8.jakarta
    generatedGav: com.github.mshin:example-api:1.0.0
    author: MunChul Shin
    openapiFile: openapi.yml
    dependencyGav:
        - com.github.mshin:example-domain-model:0.0.1
    license:
        - licenseFile: licenses/LICENSE.txt
          fileTypes:
              - .java
        - licenseFile: licenses/License2.txt
          fileTypes:
              - .xml
type: object
properties:
  id:
    type: string
    pattern: "^[\\w\\.\\-]+$"
    description: |
      The unique path to the generate script. '.' delimited.
  generatedGav:
    type: string
    pattern: "^[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+(:.+|)$"
    description: |
      The maven GAV (groupId:artifactId:version) for the generated code.
  author:
    type: string
    description: |
      The person who authored the code.
  openapiFile:
    type: string
    description: |
      The path to the file where the OpenAPI document is located.
  dependencyGav:
    type: array
    description: |
      A list of dependency GAVs to add to the generated projects' pom.
    items:
      type: string
      pattern: "^[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+:[\\w\\-\\$\\.]+$"
  license:
    type: array
    description: |
      A list of license files and the file types they should be applied to.
      Licenses will be prepended to files of the corresponding type.
      Licenses will be prepended in the order they are listed,
      so if multiple licenses apply to a file type,
      the first license in the list will be the bottom-most license in the file.
    items:
      type: object
      properties:
        licenseFile:
          type: string
          description: |
            The path to where the license file is located.
        fileTypes:
          type: array
          description: |
            The file extension types corresponding to the license.
            All files of these extensions will have the license prepended.
          items:
            type: string
            pattern: "^\\.([\\w~]+|\\*)$"
            description: |
              A specific file extension starting with '.' ex: '.java' or '.xml'.
              '.*' can be used to specify all file types.
required: [id, generatedGav, openapiFile]
additionalProperties: false
